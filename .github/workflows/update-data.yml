name: Update Market Data & News

on:
  schedule:
    # 10:00 PM UTC = 8:00 AM AEST (Sydney) — runs before markets open
    - cron: '0 22 * * *'
  workflow_dispatch:  # allows manual trigger from GitHub Actions tab

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # required to push the data files

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests feedparser pytz

      - name: Run data fetcher
        run: python fetch_data.py

      - name: Commit and push data files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          # Only commit if files actually changed
          git diff --staged --quiet \
            && echo "No data changes — skipping commit" \
            || (git commit -m "chore: update market data $(date -u '+%Y-%m-%d %H:%M UTC')" && git push)
